name: Ruberra Bridge Agent

on:
  push:
    branches:
      - 'agent-*'
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bridge:
    name: Ruberra Bridge — queue, gates, stalls
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all agent branches
        run: |
          git fetch origin 'refs/heads/agent-*:refs/remotes/origin/agent-*'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Ruberra Bridge
        run: node scripts/bridge/bridge.mjs

      - name: Commit bridge outputs
        run: |
          git config user.name "Ruberra Bridge Agent"
          git config user.email "bridge@ruberra.ai"
          git add ops/BRIDGE_STATE.md ops/NEXT_ACTION.md ops/GATE_*.md ops/STALL_REPORT_*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No bridge changes."
          else
            git commit -m "BRIDGE-AUTO: $(date -u +%Y-%m-%dT%H:%M:%SZ) | state sync + gate check"
            git push origin main
          fi
