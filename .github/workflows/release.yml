name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    name: desktop / ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            tauri-target: ""
          - platform: windows-latest
            tauri-target: ""
          - platform: macos-latest
            tauri-target: "universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Hard-block release builds when the Tauri updater pubkey is empty.
      # An empty pubkey means the installed app accepts any signed payload
      # served by the endpoint — a remote-code-execution vector. Generate
      # a key pair with `npx @tauri-apps/cli signer generate`, paste the
      # PUBLIC key into apps/desktop/src-tauri/tauri.conf.json's
      # plugins.updater.pubkey, and store the PRIVATE key + password as
      # GitHub Secrets TAURI_SIGNING_PRIVATE_KEY{,_PASSWORD}.
      # See docs/SECURITY_AUDIT.md section 5.
      - name: assert updater pubkey is present
        shell: bash
        run: |
          PUBKEY=$(node -e "console.log(JSON.parse(require('fs').readFileSync('apps/desktop/src-tauri/tauri.conf.json','utf8')).plugins.updater.pubkey || '')")
          if [ -z "$PUBKEY" ]; then
            echo "::error::tauri.conf.json plugins.updater.pubkey is empty — generate a signing key pair and fix it before tagging a release. See docs/SECURITY_AUDIT.md §5."
            exit 1
          fi

      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # macOS universal binary needs both architectures explicitly —
      # the runner only ships aarch64-apple-darwin by default, so the
      # x86_64 half has to be added or `tauri build --target
      # universal-apple-darwin` aborts. Other matrix legs ignore this.
      - name: install macos targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: npm ci

      - name: tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Composer's build throws if VITE_GAUNTLET_BACKEND_URL is
          # unset. Pull from a repo secret so the URL can rotate
          # without a code edit; falls back to the current Railway
          # host if the secret is missing (legacy compat).
          VITE_GAUNTLET_BACKEND_URL: ${{ secrets.GAUNTLET_BACKEND_URL || 'https://ruberra-backend-jkpf-production.up.railway.app' }}
        working-directory: apps/desktop
        run: |
          if [ -n "${{ matrix.tauri-target }}" ]; then
            npm run tauri:build -- --target ${{ matrix.tauri-target }}
          else
            npm run tauri:build
          fi
        shell: bash

      - name: upload installers
        uses: softprops/action-gh-release@v2
        with:
          # Path uses `target/**/release/bundle/**` rather than
          # `target/release/bundle/**` so the macOS universal build
          # (which writes to target/universal-apple-darwin/release/bundle/...)
          # is included alongside the default-target Linux + Windows
          # outputs. Without the extra `**` the .dmg + latest.json + .sig
          # for macOS were silently dropped from the GitHub release.
          files: |
            apps/desktop/src-tauri/target/**/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/**/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/**/latest.json
            apps/desktop/src-tauri/target/**/release/bundle/**/*.sig

  extension:
    name: browser-extension
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: build chrome zip
        working-directory: apps/browser-extension
        env:
          # See note in the desktop job — same env-driven URL.
          VITE_GAUNTLET_BACKEND_URL: ${{ secrets.GAUNTLET_BACKEND_URL || 'https://ruberra-backend-jkpf-production.up.railway.app' }}
        run: npm run zip
      - name: build firefox zip
        working-directory: apps/browser-extension
        env:
          VITE_GAUNTLET_BACKEND_URL: ${{ secrets.GAUNTLET_BACKEND_URL || 'https://ruberra-backend-jkpf-production.up.railway.app' }}
        run: npm run zip:firefox
      - name: upload zips
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/browser-extension/.output/*.zip

  python:
    name: backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pytest -q
