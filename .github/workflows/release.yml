name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    name: desktop / ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            tauri-target: ""
          - platform: windows-latest
            tauri-target: ""
          - platform: macos-latest
            tauri-target: "universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: npm ci

      - name: tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/desktop
        run: |
          if [ -n "${{ matrix.tauri-target }}" ]; then
            npm run tauri:build -- --target ${{ matrix.tauri-target }}
          else
            npm run tauri:build
          fi
        shell: bash

      - name: upload installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/release/bundle/**/latest.json
            apps/desktop/src-tauri/target/release/bundle/**/*.sig

  extension:
    name: browser-extension
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: build chrome zip
        working-directory: apps/browser-extension
        run: npm run zip
      - name: build firefox zip
        working-directory: apps/browser-extension
        run: npm run zip:firefox
      - name: upload zips
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/browser-extension/.output/*.zip

  python:
    name: backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pytest -q
