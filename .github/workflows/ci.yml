name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

      # Desktop tsconfig is stricter than the root (noUnusedLocals,
      # noUnusedParameters) and includes the composer source under its
      # `include`. The release.yml `tauri:build` runs this exact check
      # via `apps/desktop/package.json`'s build script — running it
      # here catches drift before a release tag.
      - name: desktop typecheck
        working-directory: apps/desktop
        run: npx tsc --noEmit

      - env:
          # Composer's build throws when this is unset in a production
          # build. CI is not a real release — point it at the current
          # Railway service URL so `vite build` succeeds. Replace the
          # value here when the backend host is renamed.
          VITE_GAUNTLET_BACKEND_URL: https://ruberra-backend-jkpf-production.up.railway.app
        run: npm run build

      # Pure-module unit tests for the composer package (placement,
      # helpers, dom-actions). Runs under happy-dom so the DOM-touching
      # branches work without a real browser.
      - run: npm run test --workspace=@gauntlet/composer

      # Voice ban-list lint — covers every operator-facing surface
      # (control-center, composer package, browser-extension + desktop
      # shells). See scripts/check-voice.mjs for the rules.
      - run: npm run check:voice

      # Lei do Capsule: packages/composer/src/Capsule.tsx is allowed to
      # shrink, never grow. Wave 2 of the refactor extracts features to
      # sub-components (CommandPalette, SettingsDrawer, PlanRenderer,
      # voice/TTS hooks). Each PR that lands in that sequence lowers
      # this budget — never raises it. Target: <= 800 lines by end of
      # Wave 2. See CLAUDE.md "Lei do Capsule".
      #
      # Budget tracks high-water-mark, not slack: every PR that touches
      # Capsule.tsx ratchets BUDGET down to the new line count before
      # merging.
      - name: capsule size budget
        run: |
          BUDGET=771
          LINES=$(wc -l < packages/composer/src/Capsule.tsx | tr -d ' ')
          echo "Capsule.tsx: $LINES lines (budget: $BUDGET)"
          if [ "$LINES" -gt "$BUDGET" ]; then
            echo "::error::Capsule.tsx grew past budget ($LINES > $BUDGET). Extract a sub-component before merging — see CLAUDE.md 'Lei do Capsule'."
            exit 1
          fi

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio
      # Known-CVE check on the resolved tree. Hard fail — a published
      # advisory in a runtime dep is a release blocker; the right
      # response is to bump or pin a waiver, not to merge a
      # known-vulnerable tree. To temporarily allow a transient PyPI
      # advisory through, append ``--ignore-vuln=<GHSA-id>`` with a
      # comment pointing at the tracking issue — never re-loosen the
      # gate for every dep.
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit
      # Syntax + import check without starting the server or hitting any provider.
      - run: python -m compileall -q .
      - env:
          ANTHROPIC_API_KEY: placeholder-for-import-check
        run: |
          python -c "
          import importlib
          # Every backend Python module the runtime touches. Adding a
          # new module without listing it here means a syntax error
          # in the new file passes CI silently — keep this list
          # exhaustive.
          mods = (
              'config','models','doctrine','memory','memory_records','tools',
              'agent','engine','server','main',
              'composer','composer_settings','runs','spine','auth','rate_limit',
              'security_headers','log_redaction','model_gateway',
              'groq_provider','gemini_provider','mock_client','observability',
              'runtime','context_router','pause_registry','persistence',
              'backup','voice',
              'routers.health','routers.ask','routers.agent',
              'routers.runs','routers.memory','routers.spine',
              'routers.tools','routers.git','routers.permissions',
              'routers.observability',
          )
          for mod in mods:
              importlib.import_module(mod)
          print(f'all {len(mods)} modules import cleanly')
          "
      - env:
          GAUNTLET_MOCK: "1"
          GAUNTLET_RATE_LIMIT_DISABLED: "1"
        run: pytest -q

  desktop-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: install linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: cargo test (smoke helpers)
        working-directory: apps/desktop/src-tauri
        run: cargo test --tests
