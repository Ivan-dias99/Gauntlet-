name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      # Syntax + import check without starting the server or hitting any provider.
      - run: python -m compileall -q .
      - env:
          ANTHROPIC_API_KEY: placeholder-for-import-check
        run: |
          python -c "
          import importlib
          mods = (
              'config','models','doctrine','memory','tools',
              'agent','engine','server','main',
              'composer','runs','spine','auth','rate_limit',
              'security_headers','log_redaction','model_gateway',
              'gemini_provider','mock_client','observability',
          )
          for mod in mods:
              importlib.import_module(mod)
          print(f'all {len(mods)} modules import cleanly')
          "
