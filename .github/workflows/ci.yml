name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signal-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: signal-backend/requirements.txt
      - run: pip install -r requirements.txt
      # Syntax + import check without starting the server or hitting Anthropic.
      - run: python -m compileall -q .
      - env:
          ANTHROPIC_API_KEY: placeholder-for-import-check
        run: |
          python -c "
          import importlib
          for mod in ('config','models','doctrine','memory','tools','agent','engine','server','main'):
              importlib.import_module(mod)
          print('all modules import cleanly')
          "
